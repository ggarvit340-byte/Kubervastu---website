<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KuberVastu - Astro & Vastu Consultation | Vijay Kumar Goyal</title>
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {font-family: 'Georgia', serif; background: #3B2F2F; color: #F5E6C8; line-height: 1.6;}
    .container {max-width: 1200px; margin: auto; padding: 0 20px;}
    
    header {background: #2C2320; padding: 15px 0; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #D4AF37;}
    .nav {display: flex; justify-content: space-between; align-items: center;}
    .logo-img {height: 70px; filter: drop-shadow(0 0 10px rgba(212,175,55,0.8));}
    .nav-links a {color: #F5E6C8; text-decoration: none; margin-left: 25px; font-size: 16px;}
    .nav-links a:hover {color: #D4AF37;}
    
    .hero {text-align: center; padding: 80px 20px; background: linear-gradient(rgba(44,35,32,0.9), rgba(44,35,32,0.9)), url('https://images.unsplash.com/photo-1616046229478-9901c5536a45?q=80&w=2000') center/cover;}
    .hero h1 {font-size: 42px; color: #D4AF37; margin-bottom: 10px;}
    .hero p {font-size: 20px; margin-bottom: 10px; color: #F5E6C8;}
    .founder {font-size: 18px; color: #D4AF37; margin-bottom: 30px; font-style: italic;}
    .btn {background: #D4AF37; color: #3B2F2F; padding: 15px 35px; text-decoration: none; font-weight: bold; border-radius: 5px; display: inline-block; margin: 5px;}
    .btn:hover {background: #F5E6C8;}
    .btn-whatsapp {background: #25D366; color: white;}
    
    section {padding: 60px 0;}
    h2 {text-align: center; font-size: 36px; color: #D4AF37; margin-bottom: 40px;}
    
    .services {display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;}
    .card {background: #2C2320; padding: 30px; border-radius: 8px; border: 1px solid #D4AF37; text-align: center;}
    .card h3 {color: #D4AF37; margin-bottom: 15px; font-size: 22px;}
    
    .contact-grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 30px;}
    .contact-box {background: #2C2320; padding: 30px; border-radius: 8px; text-align: center; border: 1px solid #D4AF37;}
    .contact-box h3 {color: #D4AF37; margin-bottom: 15px;}
    .contact-box p {font-size: 16px; margin: 8px 0;}
    .contact-box a {color: #F5E6C8; text-decoration: none;}
    .contact-box a:hover {color: #D4AF37;}
    
    footer {background: #2C2320; text-align: center; padding: 30px 20px; margin-top: 40px; border-top: 1px solid #D4AF37;}
    footer p {margin: 5px 0;}
    
    @media (max-width: 768px) {
      .nav {flex-direction: column; gap: 15px;}
      .hero h1 {font-size: 32px;}
      .logo-img {height: 55px;}
    }
  </style>
